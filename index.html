<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="description" content="PDA-profile intervention planning for SLPs, educators, and clinicians. Evidence-informed, neurodiversity-affirming, declarative-language-based." />

    <script>
      (function(){
        try {
          var saved = localStorage.getItem('rtn-theme');
          document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
        } catch(e){ document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>

    <div class="rainbow-bar" aria-hidden="true" style="height:6px;width:100%;background:linear-gradient(90deg,#8dd4b0 0%,#b8a0d8 50%,#f4b5c5 100%);position:fixed;top:0;left:0;right:0;z-index:9999;"></div>

  </body>
